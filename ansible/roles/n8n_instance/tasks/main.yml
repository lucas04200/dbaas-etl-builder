---
- name: S'assurer que le réseau Docker partagé existe
  community.docker.docker_network:
    name: "{{ network_name }}"
    state: present

- name: Création du volume Docker pour l'instance n8n
  community.docker.docker_volume:
    name: "{{ n8n_volume_name }}"
    state: present

- name: Configuration de base n8n
  set_fact:
    n8n_env:
      N8N_ENFORCEMENT_SECURITY: "false"
      WEBHOOK_URL: "http://localhost:{{ host_port }}/"
      GENERIC_TIMEZONE: "Europe/Paris"

- name: Ajout de la configuration PostgreSQL si une DB est liée
  set_fact:
    n8n_env: "{{ n8n_env | combine({
      'DB_TYPE': 'postgresdb',
      'DB_POSTGRESDB_HOST': target_db_host,
      'DB_POSTGRESDB_PORT': '5432',
      'DB_POSTGRESDB_DATABASE': target_db_name,
      'DB_POSTGRESDB_USER': target_db_user,
      'DB_POSTGRESDB_PASSWORD': target_db_password
    }) }}"
  when: target_db_host is defined and target_db_host | length > 0

- name: Déploiement du conteneur n8n
  community.docker.docker_container:
    name: "{{ n8n_container_name }}"
    image: "{{ n8n_image }}"
    networks:
      - name: "{{ network_name }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - "{{ n8n_volume_name }}:/home/node/.n8n"
    published_ports:
      - "{{ host_port }}:5678"
    env: "{{ n8n_env }}"
  environment:
    DOCKER_CONFIG: "/tmp/empty_docker_config_to_bypass_wsl_bug"
