---
- name: S'assurer que le réseau Docker partagé existe
  community.docker.docker_network:
    name: "{{ network_name }}"
    state: present

- name: Création du volume Docker pour l'instance Ollama
  community.docker.docker_volume:
    name: "{{ ollama_volume_name }}"
    state: present

- name: Déploiement du conteneur Ollama
  community.docker.docker_container:
    name: "{{ ollama_container_name }}"
    image: "{{ ollama_image }}"
    networks:
      - name: "{{ network_name }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - "{{ ollama_volume_name }}:/root/.ollama"
    published_ports:
      - "{{ host_port }}:11434"
  environment:
    DOCKER_CONFIG: "/tmp/empty_docker_config_to_bypass_wsl_bug"
