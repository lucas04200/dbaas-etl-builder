name: Deploy Full Stack on Push (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint Infrastructure Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
          ansible-galaxy collection install community.docker

      - name: Syntax Check des Playbooks
        run: |
          ansible-playbook --syntax-check ansible/deploy_postgres.yml
          ansible-playbook --syntax-check ansible/deploy_n8n.yml

  deploy:
    name: Déploiement Complet sur NAS / VM Privée
    needs: lint
    runs-on: self-hosted
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer la dépendance Docker pour Ansible (Si manquante)
        run: ansible-galaxy collection install community.docker

      - name: "[Provisioning] 1. Déployer la Database PostgreSQL"
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy_postgres.yml \
            -e "instance_name=testenv \
                db_name=db_testenv \
                db_user=admin_testenv \
                db_password=SecureTestPass1! \
                host_port=5432"

      - name: "[Provisioning] 2. Déployer l'ETL n8n lié à la base"
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy_n8n.yml \
            -e "instance_name=testenv \
                host_port=5678 \
                target_db_host=pg_testenv \
                target_db_name=db_testenv \
                target_db_user=admin_testenv \
                target_db_password=SecureTestPass1!"
